version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artifexai-app
    restart: unless-stopped
    ports:
      - "7070:7070"
    volumes:
      - ./.env:/app/.env:ro
      - ./cloudfront-private-key.pem:/app/cloudfront-private-key.pem:ro
      - ./gemini-vertex-476303-6817ac1e312f.json:/app/credentials/google-credentials.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/google-credentials.json
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    networks:
      - artifexai-network


networks:
  artifexai-network:
    driver: bridge

