spring.application.name=ArtifexAI

api.token=${API_TOKEN}

server.port=7070

app.timezone=UTC

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.main.allow-circular-references=true

spring.datasource.url=${POSTGRESQL_URL}
spring.datasource.username=${POSTGRESQL_USERNAME}
spring.datasource.password=${POSTGRESQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=postgresql

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

spring.cache.redis.time-to-live=1200000
spring.cache.redis.key-prefix=ArtifexAI::
spring.cache.redis.use-key-prefix=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

smtp.host=smtp.gmail.com
smtp.port=587
smtp.auth=true
smtp.startTls=true
smtp.senderEmail=${SMTP_SENDER_EMAIL}
smtp.senderPassword=${SMTP_SENDER_PASSWORD}
smtp.senderName=ArtifexAI Support Team

gemini.vertex.project=${GEMINI_VERTEX_PROJECT}
gemini.vertex.location=global
gemini.imageModel=gemini-3-pro-image-preview
gemini.upscaleModel=imagen-4.0-upscale-preview
gemini.maskEditModel=imagen-3.0-capability-001
gemini.videoModel=veo-2.5-generate
gemini.textModel=gemini-2.5-pro

aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN}
aws.cloudfront.keyPairId=${AWS_CLOUDFRONT_KEY_PAIR_ID}
aws.cloudfront.privateKeyPath=${AWS_CLOUDFRONT_PRIVATE_KEY_PATH}
aws.cloudfront.url-access-time=12

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.security.oauth2.client.registration.github.scope=read:user,user:email

# OAuth2 mobile deep link
oauth2.mobile.redirect-uri=artifexai://oauth2/callback

huggingface.apiKey=${HUGGINGFACE_API_KEY}
huggingface.flux2.generateUrl=https://router.huggingface.co/fal-ai/fal-ai/flux/dev?_subdomain=queue
huggingface.flux2.editUrl=https://router.huggingface.co/fal-ai/fal-ai/flux-2/klein/4b/distilled/edit?_subdomain=queue
huggingfacepoll.IntervalMs=5000
huggingface.maxPollAttempts=150

huggingface.qwen.generateUrl=https://router.huggingface.co/fal-ai/fal-ai/qwen-image-2512?_subdomain=queue
huggingface.qwen.editUrl=https://router.huggingface.co/fal-ai/fal-ai/qwen-image-edit-plus?_subdomain=queue

huggingface.firered.editUrl=https://router.huggingface.co/fal-ai/fal-ai/firered-image-edit-v1.1?_subdomain=queue
