spring.application.name=ArtifexAI

api.token=${API_TOKEN}

server.port=7070

app.timezone=UTC

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.main.allow-circular-references=true

spring.datasource.url=${POSTGRESQL_URL}
spring.datasource.username=${POSTGRESQL_USERNAME}
spring.datasource.password=${POSTGRESQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=postgresql

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

spring.cache.redis.time-to-live=1200000
spring.cache.redis.key-prefix=ArtifexAI::
spring.cache.redis.use-key-prefix=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

smtp.host=smtp.gmail.com
smtp.port=587
smtp.auth=true
smtp.startTls=true
smtp.senderEmail=${SMTP_SENDER_EMAIL}
smtp.senderPassword=${SMTP_SENDER_PASSWORD}
smtp.senderName=ArtifexAI Support Team

gemini.vertex.project=${GEMINI_VERTEX_PROJECT}
gemini.vertex.location=global
gemini.imageModel=gemini-3-pro-image-preview
gemini.upscaleModel=imagen-4.0-upscale-preview
gemini.maskEditModel=imagen-3.0-capability-001
gemini.videoModel=veo-3.1-generate-preview
gemini.textModel=gemini-2.5-pro

aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN}
aws.cloudfront.keyPairId=${AWS_CLOUDFRONT_KEY_PAIR_ID}
aws.cloudfront.privateKeyPath=${AWS_CLOUDFRONT_PRIVATE_KEY_PATH}
aws.cloudfront.url-access-time=12

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.security.oauth2.client.registration.github.scope=read:user,user:email

# OAuth2 mobile deep link
oauth2.mobile.redirect-uri=artifexai://oauth2/callback

# fal-ai configuration
falai.apiKey=${FAL_AI_KEY}

falai.flux.generateModel=fal-ai/flux-2-pro
falai.flux.editModel=fal-ai/flux-2-pro/edit
falai.qwen.generateModel=fal-ai/qwen-image-2512
falai.qwen.editModel=fal-ai/qwen-image-edit-2511
falai.gpt.generateModel=openai/gpt-image-2
falai.gpt.editModel=openai/gpt-image-2/edit
